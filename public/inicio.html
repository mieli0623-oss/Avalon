<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Prologis Martel</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #00594C; margin: 0; display: flex; align-items: flex-end; height: 100vh; }
        .login-card { background: white; width: 100%; height: 85%; border-radius: 40px 40px 0 0; padding: 40px 30px; box-sizing: border-box; text-align: center; }
        
        .logos-wrapper { display: flex; justify-content: center; align-items: center; gap: 25px; margin-bottom: 40px; }
        .logo-frame-login {
            width: 140px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-frame-login img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        input { width: 100%; padding: 18px; border: 1px solid #E2E8F0; border-radius: 15px; margin-bottom: 20px; box-sizing: border-box; font-size: 16px; background: #F8FAFC; }
        button { width: 100%; padding: 18px; background: #00594C; color: white; border: none; border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logos-wrapper">
            <div class="logo-frame-login"><img src="/img/prologis.png"></div>
            <div class="logo-frame-login"><img src="/img/martel.png"></div>
        </div>
        <h2 style="margin-bottom: 30px;">Inicio de sesión</h2>
        <input type="text" placeholder="Usuario">
        <input type="password" placeholder="Contraseña">
        <button onclick="location.href='visitor_request.html'">INGRESAR</button>
    </div>
</body>
</html>
