<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activar Cuenta</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI,sans-serif;
    background:linear-gradient(135deg,#00594C,#004838);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    background:white;
    width:100%;
    max-width:450px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
}

h1{
    text-align:center;
    color:#00594C;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
    color:#00594C;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

button{
    width:100%;
    background:#00594C;
    color:white;
    border:none;
    padding:14px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

button:hover{
    background:#004838;
}

.message{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
}

.success{
    color:green;
}

.error{
    color:red;
}

</style>

<script src="api-config.js"></script>

</head>
<body>

<div class="container">

    <h1>Activar Cuenta</h1>

    <p class="subtitle">
        Introduce el código enviado por el administrador
    </p>

    <div class="input-group">
        <label>Usuario</label>
        <input
            type="text"
            id="username"
            placeholder="Tu usuario">
    </div>

    <div class="input-group">
        <label>Código de activación</label>
        <input
            type="text"
            id="code"
            placeholder="Ej: 879064">
    </div>

    <button onclick="activarCuenta()">
        Activar Cuenta
    </button>

    <div id="mensaje" class="message"></div>

</div>

<script>

async function activarCuenta(){

    const username =
        document.getElementById('username').value.trim();

    const code =
        document.getElementById('code').value.trim();

    const mensaje =
        document.getElementById('mensaje');

    if(!username || !code){

        mensaje.className = 'message error';

        mensaje.innerHTML =
            'Complete todos los campos';

        return;
    }

    try{

        const response =
            await fetch(
                apiUrl('/auth/activate'),
                {
                    method:'POST',
                    headers:{
                        'Content-Type':'application/json'
                    },
                    body:JSON.stringify({
                        username,
                        code
                    })
                }
            );

        const data =
            await response.json();

        if(data.success){

            mensaje.className =
                'message success';

            mensaje.innerHTML =
                '✅ Cuenta activada correctamente';

            setTimeout(()=>{

                window.location.href =
                    'login.html';

            },2000);

        }else{

            mensaje.className =
                'message error';

            mensaje.innerHTML =
                data.error || 'Código incorrecto';

        }

    }catch(error){

        console.error(error);

        mensaje.className =
            'message error';

        mensaje.innerHTML =
            'Error de conexión';

    }

}

</script>

</body>
</html>
