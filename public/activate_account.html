<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Activar Cuenta</title>

<style>

body{
    font-family:'Segoe UI',sans-serif;
    background:#00594C;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.card{
    background:white;
    width:90%;
    max-width:450px;
    padding:30px;
    border-radius:20px;
    text-align:center;
}

h2{
    color:#00594C;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#00594C;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

#msg{
    margin-top:15px;
    font-weight:bold;
}

</style>
</head>
<body>

<div class="card">

    <h2>Activación de Cuenta</h2>

    <input
        type="text"
        id="username"
        placeholder="Usuario"
    >

    <input
        type="text"
        id="code"
        placeholder="Código de activación"
    >

    <button onclick="activarCuenta()">
        ACTIVAR CUENTA
    </button>

    <div id="msg"></div>

</div>

<script src="api-config.js"></script>

<script>

async function activarCuenta(){

    const username =
        document.getElementById('username').value.trim();

    const code =
        document.getElementById('code').value.trim();

    if(!username || !code){

        document.getElementById('msg').innerHTML =
            '⚠️ Completa todos los campos';

        return;
    }

    try{

        const res = await fetch(
            apiUrl('/api/auth/activate'),
            {
                method:'POST',
                headers:{
                    'Content-Type':'application/json'
                },
                body:JSON.stringify({
                    username,
                    code
                })
            }
        );

        const data = await res.json();

        if(res.ok){

            document.getElementById('msg').innerHTML =
                '✅ Cuenta activada correctamente';

            setTimeout(() => {

                window.location.href = 'index.html';

            },2000);

        }else{

            document.getElementById('msg').innerHTML =
                '❌ ' + data.error;

        }

    }catch(error){

        document.getElementById('msg').innerHTML =
            '❌ Error de conexión';

        console.error(error);

    }

}

</script>

</body>
</html>
